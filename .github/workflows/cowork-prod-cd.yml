name: cowork prod CD Workflow

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    environment: 'Prod-CD'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        run: |
          DATE=$(date -u +%Y%m%d)
          LAST=$(git tag -l "v${DATE}.*" | sort -t. -k2 -n | tail -1)
          if [ -z "$LAST" ]; then
            N=0
          else
            LAST_N=$(echo "$LAST" | sed "s/v${DATE}\.//")
            N=$((LAST_N + 1))
          fi
          echo "tag=v${DATE}.${N}" >> "$GITHUB_OUTPUT"

      - name: Generate release notes
        id: notes
        run: |
          LAST_TAG=$(git tag --sort=-version:refname | head -1)
          if [ -z "$LAST_TAG" ]; then
            COMMITS=$(git log --pretty=format:"- %s" HEAD)
          else
            COMMITS=$(git log --pretty=format:"- %s" "${LAST_TAG}..HEAD")
          fi
          {
            echo 'body<<EOF'
            echo "## 수정내역"
            echo "$COMMITS"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ steps.version.outputs.tag }}
          git push origin ${{ steps.version.outputs.tag }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Import signing certificate
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
        run: |
          echo "$MACOS_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p "temp_password" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "temp_password" build.keychain
          security import certificate.p12 -k build.keychain -P "$MACOS_CERTIFICATE_PWD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "temp_password" build.keychain
          rm -f certificate.p12

      - name: Build signed DMG
        run: ./gradlew :composeApp:packageDmg

      - name: Notarize DMG
        env:
          NOTARIZATION_APPLE_ID: ${{ secrets.NOTARIZATION_APPLE_ID }}
          NOTARIZATION_PWD: ${{ secrets.NOTARIZATION_PWD }}
          NOTARIZATION_TEAM_ID: ${{ secrets.NOTARIZATION_TEAM_ID }}
        run: |
          DMG=$(ls composeApp/build/compose/binaries/main/dmg/*.dmg)
          xcrun notarytool submit "$DMG" \
            --apple-id "$NOTARIZATION_APPLE_ID" \
            --password "$NOTARIZATION_PWD" \
            --team-id "$NOTARIZATION_TEAM_ID" \
            --wait

      - name: Staple notarization ticket
        run: xcrun stapler staple "$(ls composeApp/build/compose/binaries/main/dmg/*.dmg)"

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          body: ${{ steps.notes.outputs.body }}
          draft: true
          files: composeApp/build/compose/binaries/main/dmg/*.dmg
